<div th:fragment="results" xmlns:th="http://www.thymeleaf.org">
    <section class="books-section mb-5">
        <h2 class="section-title mb-3">Kết quả tìm kiếm</h2>

        <div class="books-grid">
            <div class="book-item" th:each="book : ${books}">
                <a th:href="@{/home/books/{id}(id=${book.bookId})}"
                   class="card h-100 text-center book-card text-decoration-none text-dark">
                    <div class="card-body d-flex flex-column align-items-center">
                        <div class="book-image mb-3">
                            <img th:src="@{'/images/books/' + ${book.picture}}"
                                 style="width:150px;height:220px;object-fit:cover;" alt="">
                        </div>
                        <h5 class="card-title mb-2" th:text="${book.title}"></h5>

                        <div class="book-rating mb-2">
                            <span th:each="i : ${#numbers.sequence(1,5)}"
                                  class="star"
                                  th:text="${i <= avgRatings[book.bookId]} ? '★' : '☆'"></span>
                            <span class="rating-count"
                                  th:text="'(' + ${ratingCounts[book.bookId]} + ')'"></span>
                        </div>

                        <p class="card-text mb-1 text-muted" th:text="${book.author}"></p>
                        <p class="card-text text-danger font-weight-bold mt-auto"
                           th:text="${#numbers.formatInteger(book.price, 3, 'COMMA')} + ' ₫'"></p>
                    </div>
                </a>
            </div>

            <div class="book-empty" th:if="${#lists.isEmpty(books)}">
                <p class="text-muted text-center">Không tìm thấy sách phù hợp.</p>
            </div>
        </div>
    </section>
</div>
